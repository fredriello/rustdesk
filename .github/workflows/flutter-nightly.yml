name: Flutter Nightly Build

# NOTE: GitHub Actions scheduled triggers only run on the repository's default
# branch. Ensure the default branch is set to `master` for cron to fire.
on:
  schedule:
    # schedule build every night
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync-upstream:
    uses: ./.github/workflows/sync-upstream.yml
    secrets: inherit

  run-flutter-nightly-build:
    needs: [sync-upstream]
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
